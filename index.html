<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Sayali ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
}

/* INTRO */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:50px;
letter-spacing:4px;
z-index:10;
}

#introText{
border-right:3px solid white;
white-space:nowrap;
overflow:hidden;
}

/* MAIN */

#main{
display:none;
}

.box{
background:white;
padding:40px;
width:360px;
margin:auto;
margin-top:140px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
color:#ff4d6d;
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
background:gray;
color:white;
position:absolute;
}

#musicBtn{
background:#ff4d6d;
color:white;
}

/* HEARTS */

.heart{
position:absolute;
font-size:22px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-900px);}
}

</style>
</head>

<body>

<!-- INTRO -->

<div id="intro">
<div id="introText"></div>
</div>

<!-- MAIN PAGE -->

<div id="main">

<div class="box">

<h1>I'm Really Sorry Sayali</h1>

<p id="message"></p>

<h3>Will you forgive me?</h3>

<button id="yes" onclick="yesClick()">Yes</button>
<button id="no">No</button>

<br><br>

<button id="musicBtn" onclick="playMusic()">🔊 Play Music</button>

</div>

</div>

<!-- MUSIC -->

<audio id="music" loop>
<source src="bairan.mp3" type="audio/mpeg">
</audio>

<script>

/* INTRO TYPING */

let introText="For Sayali ❤️";
let introIndex=0;

function typeIntro(){

if(introIndex<introText.length){
document.getElementById("introText").innerHTML+=introText.charAt(introIndex);
introIndex++;
setTimeout(typeIntro,120);
}
else{

setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("main").style.display="block";
},2000);

}

}

typeIntro();

/* MESSAGE TYPING */

let message="Sayali, मला खरंच खूप वाईट वाटतंय. माझ्याकडून चूक झाली आणि मी तुला खोटं बोललो. I never meant to hurt you. तू माझ्यासाठी खूप important आहेस. Please मला एक chance दे.";

let i=0;

function typeMessage(){

if(i<message.length){
document.getElementById("message").innerHTML+=message.charAt(i);
i++;
setTimeout(typeMessage,40);
}

}

setTimeout(typeMessage,3000);

/* NO BUTTON RUN */

document.getElementById("no").onmouseover=function(){
this.style.left=Math.random()*300+"px";
this.style.top=Math.random()*400+"px";
}

/* YES CLICK */

function yesClick(){
alert("Thank you Sayali ❤️ I promise I will never hurt you again.");
}

/* PLAY MUSIC BUTTON */

function playMusic(){
document.getElementById("music").play();
}

/* HEARTS */

function createHeart(){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.top="100vh";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},6000);

}

setInterval(createHeart,500);

</script>

</body>
</html>
